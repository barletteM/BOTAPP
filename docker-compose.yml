services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: glowdom
      POSTGRES_PASSWORD: glowdom
      POSTGRES_DB: glowdom_reception
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  postgres-data:
